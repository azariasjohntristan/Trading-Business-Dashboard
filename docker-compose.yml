services:
  db:
    image: postgres:17-alpine
    container_name: trading-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading123
      POSTGRES_DB: trading_dashboard
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trading-net

  server:
    build:
      context: ./server
    container_name: trading-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://trading:trading123@db:5432/trading_dashboard
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - trading-net
    labels:
      - "traefik.enable=false"

  web:
    build:
      context: ./web
    container_name: trading-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - trading-net

volumes:
  pgdata:

networks:
  trading-net:
    driver: bridge
